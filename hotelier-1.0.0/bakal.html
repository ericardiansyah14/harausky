<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Penginapan Showcase Animated Background</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
/* ===== BODY & BACKGROUND HOTEL ===== */
body {
    min-height: 100vh;
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f8f4f0;
    position: relative;
    overflow-x: hidden;
}

/* Layer 1: soft diagonal stripes */
body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: repeating-linear-gradient(
        45deg,
        rgba(255,255,255,0.05) 0 50px,
        rgba(0,0,0,0.02) 50px 100px
    );
    animation: move1 30s linear infinite;
    z-index: -1;
}

/* Layer 2: subtle circle gradient overlay */
body::after {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 50%);
    animation: move2 45s linear infinite;
    z-index: -1;
}

/* Animasi layer selang-seling */
@keyframes move1 {
    0% { transform: translate(0,0) rotate(0deg); }
    50% { transform: translate(50px,50px) rotate(180deg); }
    100% { transform: translate(0,0) rotate(360deg); }
}

@keyframes move2 {
    0% { transform: translate(0,0) scale(1); }
    50% { transform: translate(-50px,30px) scale(1.2); }
    100% { transform: translate(0,0) scale(1); }
}

/* ===== TEKS ===== */
.content-text h2 {
    font-weight: 700;
    font-size: 2rem;
    margin-bottom: 1rem;
    color: #3b3b3b;
}

.content-text p {
    color: #555;
    line-height: 1.8;
    margin-bottom: 1rem;
}

/* ===== GALERI ===== */
.gallery-item {
    overflow: hidden;
    border-radius: 12px;
    cursor: zoom-in;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    background: #fff;
    transition: transform 0.3s;
}

.gallery-item img {
    transition: transform 0.5s ease;
}

.gallery-item:hover img {
    transform: scale(1.15);
}

/* ===== MODAL ===== */
.modal-backdrop.show {
    opacity: 0.85;
    backdrop-filter: blur(6px);
}

.modal-content {
    background: transparent;
    border: none;
}

.modal-body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    cursor: zoom-out;
}

.modal-body img {
    max-width: 100%;
    max-height: 100vh;
    object-fit: contain;
    animation: fadeImg 0.4s ease;
}

@keyframes fadeImg {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
}

.btn-close {
    filter: invert(1);
    opacity: 0.8;
}

.btn-close:hover {
    opacity: 1;
}
</style>
</head>
<body>

<div class="container py-5">
    <div class="row align-items-center g-5">

        <!-- KIRI : GALERI -->
        <div class="col-lg-6">
            <div class="row g-3">
                <div class="col-6 col-md-4">
                    <div class="gallery-item" data-bs-toggle="modal" data-bs-target="#lightboxModal" data-full="https://picsum.photos/id/1015/2000/1200">
                        <img src="https://picsum.photos/id/1015/600/400" class="img-fluid">
                    </div>
                </div>
                <div class="col-6 col-md-4">
                    <div class="gallery-item" data-bs-toggle="modal" data-bs-target="#lightboxModal" data-full="https://picsum.photos/id/1025/2000/1200">
                        <img src="https://picsum.photos/id/1025/600/400" class="img-fluid">
                    </div>
                </div>
                <div class="col-6 col-md-4">
                    <div class="gallery-item" data-bs-toggle="modal" data-bs-target="#lightboxModal" data-full="https://picsum.photos/id/1035/2000/1200">
                        <img src="https://picsum.photos/id/1035/600/400" class="img-fluid">
                    </div>
                </div>
                <div class="col-6 col-md-4">
                    <div class="gallery-item" data-bs-toggle="modal" data-bs-target="#lightboxModal" data-full="https://picsum.photos/id/1045/2000/1200">
                        <img src="https://picsum.photos/id/1045/600/400" class="img-fluid">
                    </div>
                </div>
                <div class="col-6 col-md-4">
                    <div class="gallery-item" data-bs-toggle="modal" data-bs-target="#lightboxModal" data-full="https://picsum.photos/id/1055/2000/1200">
                        <img src="https://picsum.photos/id/1055/600/400" class="img-fluid">
                    </div>
                </div>
                <div class="col-6 col-md-4">
                    <div class="gallery-item" data-bs-toggle="modal" data-bs-target="#lightboxModal" data-full="https://picsum.photos/id/1065/2000/1200">
                        <img src="https://picsum.photos/id/1065/600/400" class="img-fluid">
                    </div>
                </div>
            </div>
        </div>

        <!-- KANAN : TEKS -->
        <div class="col-lg-6 content-text">
            <h2>Penginapan Nyaman & Elegan</h2>
            <p>
                Nikmati suasana hotel/resort yang tenang dan mewah.
                Setiap sudut dirancang agar tamu merasa rileks dan nyaman.
            </p>
            <p>
                Klik foto untuk melihat detail kamar dan fasilitas
                dengan tampilan fullscreen lightbox yang smooth.
            </p>
        </div>

    </div>
</div>

<!-- MODAL SINGLE LIGHTBOX -->
<div class="modal fade" id="lightboxModal" tabindex="-1">
    <div class="modal-dialog modal-fullscreen">
        <div class="modal-content">
            <div class="modal-header border-0 position-absolute top-0 end-0 p-3">
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" data-bs-dismiss="modal">
                <img id="lightboxImage" src="">
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const galleryItems = document.querySelectorAll('.gallery-item');
const lightboxImage = document.getElementById('lightboxImage');

galleryItems.forEach(item => {
    item.addEventListener('click', () => {
        lightboxImage.src = item.getAttribute('data-full');
    });
});
</script>

</body>
</html>
