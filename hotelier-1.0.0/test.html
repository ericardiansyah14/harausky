<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Gallery Lightbox 1 Modal</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Gallery */
        .gallery-item {
            overflow: hidden;
            border-radius: 12px;
            cursor: zoom-in;
        }

        .gallery-item img {
            transition: transform 0.6s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.2);
        }

        /* Backdrop */
        .modal-backdrop.show {
            opacity: 0.85;
            backdrop-filter: blur(6px);
        }

        /* Modal animation */
        .modal.fade .modal-dialog {
            transform: scale(0.92);
            opacity: 0;
            transition: all 0.35s ease;
        }

        .modal.show .modal-dialog {
            transform: scale(1);
            opacity: 1;
        }

        /* Modal content */
        .modal-content {
            background: transparent;
            border: none;
        }

        .modal-body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            cursor: zoom-out;
        }

        .modal-body img {
            max-width: 100%;
            max-height: 100vh;
            object-fit: contain;
            animation: fadeImg 0.4s ease;
        }

        @keyframes fadeImg {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Close button */
        .btn-close {
            filter: invert(1);
            opacity: 0.8;
        }

        .btn-close:hover {
            opacity: 1;
        }
    </style>
</head>
<body>

<!-- ===== GALLERY ===== -->
<div class="container py-5">
    <h2 class="text-center mb-4">Galeri Foto</h2>

    <div class="row g-4">
        <!-- FOTO 1 -->
        <div class="col-sm-6 col-md-4">
            <div class="gallery-item"
                 data-bs-toggle="modal"
                 data-bs-target="#lightboxModal"
                 data-full="https://picsum.photos/id/1015/2000/1200">
                <img src="https://picsum.photos/id/1015/600/400" class="img-fluid">
            </div>
        </div>

        <!-- FOTO 2 -->
        <div class="col-sm-6 col-md-4">
            <div class="gallery-item"
                 data-bs-toggle="modal"
                 data-bs-target="#lightboxModal"
                 data-full="https://picsum.photos/id/1025/2000/1200">
                <img src="https://picsum.photos/id/1025/600/400" class="img-fluid">
            </div>
        </div>

        <!-- FOTO 3 -->
        <div class="col-sm-6 col-md-4">
            <div class="gallery-item"
                 data-bs-toggle="modal"
                 data-bs-target="#lightboxModal"
                 data-full="https://picsum.photos/id/1035/2000/1200">
                <img src="https://picsum.photos/id/1035/600/400" class="img-fluid">
            </div>
        </div>

        <!-- FOTO BANYAK? TINGGAL DUPLIKAT DIV INI -->
    </div>
</div>

<!-- ===== SINGLE MODAL (CUMA 1!) ===== -->
<div class="modal fade" id="lightboxModal" tabindex="-1">
    <div class="modal-dialog modal-fullscreen">
        <div class="modal-content">

            <!-- Close -->
            <div class="modal-header border-0 position-absolute top-0 end-0 p-3">
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <!-- Click outside = close -->
            <div class="modal-body" data-bs-dismiss="modal">
                <img id="lightboxImage" src="">
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const galleryItems = document.querySelectorAll('.gallery-item');
    const lightboxImage = document.getElementById('lightboxImage');

    galleryItems.forEach(item => {
        item.addEventListener('click', () => {
            const fullImg = item.getAttribute('data-full');
            lightboxImage.src = fullImg;
        });
    });
</script>

</body>
</html>
